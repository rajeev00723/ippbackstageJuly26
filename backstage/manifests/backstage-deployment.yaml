---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: backstage-postgres
  namespace: backstage
  labels:
    app: backstage-postgres
spec:
  serviceName: backstage-postgres
  replicas: 1
  selector:
    matchLabels:
      app: backstage-postgres
  template:
    metadata:
      labels:
        app: backstage-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: backstage
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "backstage", "-d", "backstage"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "backstage", "-d", "backstage"]
            initialDelaySeconds: 30
            periodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: backstage-postgres
  namespace: backstage
  labels:
    app: backstage-postgres
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: backstage-postgres

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backstage
  namespace: backstage
  labels:
    app: backstage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backstage
  template:
    metadata:
      labels:
        app: backstage
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7007"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: backstage
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h backstage-postgres -p 5432 -U backstage; do
                echo "Waiting for PostgreSQL...";
                sleep 5;
              done
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: POSTGRES_PASSWORD
      containers:
        - name: backstage
          image: ipp-platform/backstage:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7007
              name: http
          env:
            - name: NODE_ENV
              value: production
            - name: NODE_OPTIONS
              value: "--no-node-snapshot"
            - name: POSTGRES_HOST
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: POSTGRES_PORT
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: POSTGRES_PASSWORD
            - name: BACKSTAGE_SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: BACKSTAGE_SESSION_SECRET
            - name: K8S_SA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: K8S_SA_TOKEN
                  optional: true
            - name: K8S_CA_DATA
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: K8S_CA_DATA
                  optional: true
            - name: ARGOCD_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: backstage-secrets
                  key: ARGOCD_AUTH_TOKEN
                  optional: true
          volumeMounts:
            - name: backstage-config
              mountPath: /app/app-config.yaml
              subPath: app-config.yaml
            - name: backstage-config
              mountPath: /app/app-config.local.yaml
              subPath: app-config.local.yaml
            - name: backstage-catalog
              mountPath: /app/catalog
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "2Gi"
              cpu: "2"
          readinessProbe:
            tcpSocket:
              port: 7007
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
            timeoutSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 7007
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 5
      volumes:
        - name: backstage-config
          configMap:
            name: backstage-config
        - name: backstage-catalog
          configMap:
            name: backstage-catalog

---
apiVersion: v1
kind: Service
metadata:
  name: backstage
  namespace: backstage
  labels:
    app: backstage
spec:
  type: ClusterIP
  ports:
    - port: 7007
      targetPort: 7007
      protocol: TCP
      name: http
  selector:
    app: backstage

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backstage
  namespace: backstage
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  ingressClassName: nginx
  rules:
    - host: backstage.ipp.local
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: backstage
                port:
                  number: 7007
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backstage
                port:
                  number: 7007
