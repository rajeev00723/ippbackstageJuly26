apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: employee-platform
  title: Employee Platform
  description: The employee-facing application platform
spec:
  owner: developers
  domain: enterprise-apps
---
apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: idp-platform
  title: IPP — Infrastructure Platform Portal
  description: The IPP tooling and infrastructure platform
spec:
  owner: platform-engineers
  domain: platform
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: employee-portal
  title: Employee Portal
  description: Frontend web application for the employee portal
  annotations:
    github.com/project-slug: amitabhmanish13/IPS_app_demo
    backstage.io/kubernetes-namespace: employee-app
    backstage.io/kubernetes-label-selector: app=employee-frontend
  labels:
    tier: frontend
    environment: production
spec:
  type: website
  lifecycle: production
  owner: developers
  system: employee-platform
  dependsOn:
    - component:employee-backend
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: employee-backend
  title: Employee Backend
  description: Backend REST API service for the employee portal
  annotations:
    github.com/project-slug: amitabhmanish13/IPS_app_demo
    backstage.io/kubernetes-namespace: employee-app
    backstage.io/kubernetes-label-selector: app=employee-backend
  labels:
    tier: backend
    environment: production
spec:
  type: service
  lifecycle: production
  owner: developers
  system: employee-platform
  dependsOn:
    - component:employee-database
  providesApis:
    - employee-api
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: employee-database
  title: Employee Database
  description: PostgreSQL database for employee data managed by Crossplane
  annotations:
    backstage.io/kubernetes-namespace: employee-app
  labels:
    tier: database
    environment: production
spec:
  type: database
  lifecycle: production
  owner: platform-engineers
  system: employee-platform
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: aiops-engine
  title: AIOps Engine
  description: AI-powered operations intelligence and incident correlation engine
  annotations:
    github.com/project-slug: amitabhmanish13/IPS_app_demo
    backstage.io/kubernetes-namespace: aiops
    backstage.io/kubernetes-label-selector: app=aiops-engine
  labels:
    tier: platform-service
    environment: production
spec:
  type: service
  lifecycle: production
  owner: platform-engineers
  system: idp-platform
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: crossplane-platform
  title: Crossplane Platform
  description: Crossplane control plane for infrastructure provisioning
  annotations:
    backstage.io/kubernetes-namespace: crossplane-system
  labels:
    tier: infrastructure
    environment: production
spec:
  type: library
  lifecycle: production
  owner: platform-engineers
  system: idp-platform
