# ── 3 of 5 ───────────────────────────────────────────────────────────────────
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: onboard-brownfield-application
  title: Onboard Brownfield Application
  description: >
    Register and onboard an existing application onto the DHL Infrastructure Platform.
    Connect your service to platform observability, security policies, cost tracking,
    and GitOps — without re-provisioning underlying infrastructure.
  tags:
    - onboarding
    - brownfield
    - service
  annotations:
    ipp.dhl.com/card-category: "Onboarding · Brownfield"
    ipp.dhl.com/sort-order: "3"
spec:
  owner: platform-engineering
  type: service

  parameters:
    # ── Page 1: Application identity ──────────────────────────────────────────
    - title: Application Identity
      required: [appName, team, repositoryUrl, environment]
      properties:
        appName:
          title: Application Name
          type: string
          description: Unique slug for this application (lowercase, alphanumeric, hyphens)
          pattern: '^[a-z][a-z0-9-]{2,28}[a-z0-9]$'
          ui:autofocus: true
          ui:help: 'e.g. payments-api, hr-reporting, warehouse-tracker'
        team:
          title: Owning Team
          type: string
          enum: [developers, platform-engineers, operations-support, security-team]
          default: developers
        repositoryUrl:
          title: Source Repository URL
          type: string
          description: Full HTTPS URL of the existing application repository
          ui:help: 'e.g. https://github.com/dhl/payments-api'
        environment:
          title: Current Environment
          type: string
          enum: [development, staging, production]
          default: production
        description:
          title: Application Description
          type: string
          description: Brief description of what this application does
          ui:widget: textarea
        costCenter:
          title: Cost Center
          type: string
          default: 'demo-001'

    # ── Page 2: Existing infrastructure details ───────────────────────────────
    - title: Existing Infrastructure
      required: [infraType]
      properties:
        infraType:
          title: Current Infrastructure Type
          type: string
          enum: [kubernetes, vm, bare-metal, cloud-managed]
          enumNames:
            - "Kubernetes (existing cluster/namespace)"
            - "Virtual Machine (KubeVirt or external)"
            - "Bare Metal"
            - "Cloud Managed Service (RDS, EKS, AKS, etc.)"
          default: kubernetes
        existingNamespace:
          title: Kubernetes Namespace (if k8s)
          type: string
          description: Namespace where the application is currently deployed
          ui:help: 'Leave blank if not on Kubernetes'
        existingCluster:
          title: Cluster / Host Identifier
          type: string
          description: Cluster name, hostname, or ARN of the existing host
          ui:help: 'e.g. prod-cluster-01, i-0abc123, arn:aws:eks:...'

    # ── Page 3: Platform integration options ──────────────────────────────────
    - title: Platform Integration
      properties:
        enableObservability:
          title: Enroll in Platform Observability (Prometheus + Grafana)
          type: boolean
          default: true
        enablePolicies:
          title: Apply Platform Policies (OPA / Kyverno)
          type: boolean
          default: true
        enableCostTracking:
          title: Enable Cost Tracking (OpenCost)
          type: boolean
          default: true
        enableGitOps:
          title: Register in GitOps (Argo CD)
          type: boolean
          default: false

    # ── Page 4: Catalog metadata ──────────────────────────────────────────────
    - title: Catalog Registration
      properties:
        componentType:
          title: Component Type
          type: string
          enum: [service, website, library, database, queue]
          default: service
        lifecycle:
          title: Lifecycle Stage
          type: string
          enum: [experimental, production, deprecated]
          default: production
        systemName:
          title: System Name
          type: string
          description: Which Backstage System does this component belong to?
          default: employee-platform
          ui:help: 'Must match an existing catalog system (e.g. employee-platform, ipp-platform)'

  steps:
    - id: log-brownfield-request
      name: Log Brownfield Onboarding Request
      action: debug:log
      input:
        message: |
          [Brownfield Onboarding] app=${{ parameters.appName }}
          Team: ${{ parameters.team }} | Env: ${{ parameters.environment }}
          Repo: ${{ parameters.repositoryUrl }}
          Infra: ${{ parameters.infraType }} | Namespace: ${{ parameters.existingNamespace }}
          Observability: ${{ parameters.enableObservability }}
          Policies:      ${{ parameters.enablePolicies }}
          Cost Tracking: ${{ parameters.enableCostTracking }}
          GitOps:        ${{ parameters.enableGitOps }}
          Cost Center:   ${{ parameters.costCenter }}

    - id: apply-namespace-labels
      name: Apply Platform Labels to Namespace
      if: ${{ parameters.infraType === 'kubernetes' and parameters.existingNamespace !== '' }}
      action: crossplane:apply-claim
      input:
        namespace: ${{ parameters.existingNamespace }}
        manifest:
          apiVersion: v1
          kind: Namespace
          metadata:
            name: ${{ parameters.existingNamespace }}
            labels:
              platform.ipp.dhl.com/managed: "true"
              platform.ipp.dhl.com/team: ${{ parameters.team }}
              platform.ipp.dhl.com/environment: ${{ parameters.environment }}
              platform.ipp.dhl.com/cost-center: ${{ parameters.costCenter }}
              platform.ipp.dhl.com/onboarding-type: brownfield
              platform.ipp.dhl.com/app: ${{ parameters.appName }}

    - id: log-catalog-registration
      name: Log Catalog Registration
      action: debug:log
      input:
        message: |
          [Catalog] Component: ${{ parameters.appName }}
          Type: ${{ parameters.componentType }} | Lifecycle: ${{ parameters.lifecycle }}
          System: ${{ parameters.systemName }} | Owner: ${{ parameters.team }}
          Repository: ${{ parameters.repositoryUrl }}

  output:
    links:
      - title: View in Catalog
        url: http://backstage.ipp.local/catalog
        icon: catalog
      - title: Infra Onboarding Portal
        url: http://backstage.ipp.local/infra-onboarding
        icon: web
    text:
      - title: Next Steps — Brownfield Onboarding
        content: |
          **Application registered**: `${{ parameters.appName }}`
          Team: `${{ parameters.team }}` | Environment: `${{ parameters.environment }}`

          **Add `catalog-info.yaml` to your repository root (`${{ parameters.repositoryUrl }}`):**
          ```yaml
          apiVersion: backstage.io/v1alpha1
          kind: Component
          metadata:
            name: ${{ parameters.appName }}
            annotations:
              backstage.io/source-location: "url:${{ parameters.repositoryUrl }}"
              ipp.dhl.com/cost-center: ${{ parameters.costCenter }}
              ipp.dhl.com/environment: ${{ parameters.environment }}
          spec:
            type: ${{ parameters.componentType }}
            lifecycle: ${{ parameters.lifecycle }}
            owner: ${{ parameters.team }}
            system: ${{ parameters.systemName }}
          ```

          **Platform integrations requested:**
          - Observability: ${{ parameters.enableObservability }}
          - Policies (OPA/Kyverno): ${{ parameters.enablePolicies }}
          - Cost Tracking (OpenCost): ${{ parameters.enableCostTracking }}
          - GitOps (Argo CD): ${{ parameters.enableGitOps }}

          Your platform engineer will complete integration within 1 business day.

---
# ── 4 of 5 ───────────────────────────────────────────────────────────────────
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: onboard-greenfield-application
  title: Onboard Greenfield Application
  description: >
    Bootstrap a brand-new application on the DHL Infrastructure Platform.
    Provisions infrastructure, creates the catalog entry, configures GitOps,
    and enrolls in platform observability and security — all in one flow.
  tags:
    - onboarding
    - greenfield
    - service
  annotations:
    ipp.dhl.com/card-category: "Onboarding · Greenfield"
    ipp.dhl.com/sort-order: "4"
spec:
  owner: platform-engineering
  type: service

  parameters:
    # ── Page 1: Application identity ──────────────────────────────────────────
    - title: New Application Identity
      required: [appName, team, repositoryUrl, environment]
      properties:
        appName:
          title: Application Name
          type: string
          description: Unique slug (lowercase, alphanumeric, hyphens). Used as namespace and claim name.
          pattern: '^[a-z][a-z0-9-]{2,28}[a-z0-9]$'
          ui:autofocus: true
          ui:help: 'e.g. finops-portal, supply-chain-api, driver-app'
        team:
          title: Owning Team
          type: string
          enum: [developers, platform-engineers, operations-support, security-team]
          default: developers
        repositoryUrl:
          title: Source Repository URL
          type: string
          description: HTTPS URL of the new application repository (can be pre-created or empty)
          ui:help: 'e.g. https://github.com/dhl/my-new-service'
        environment:
          title: Starting Environment
          type: string
          enum: [development, staging]
          default: development
          description: New applications always start in development or staging
        description:
          title: Application Description
          type: string
          description: What does this application do? (used in catalog entry)
          ui:widget: textarea
        costCenter:
          title: Cost Center
          type: string
          default: 'demo-001'

    # ── Page 2: Infrastructure choice ─────────────────────────────────────────
    - title: Infrastructure for New Application
      required: [infraChoice, namespace]
      properties:
        infraChoice:
          title: Infrastructure Model
          type: string
          enum:
            - three-tier-k8s
            - kubevirt-vm-app
            - kind-cluster
            - platform-shared
          enumNames:
            - "Three-Tier Kubernetes App (dedicated namespace + Crossplane)"
            - "KubeVirt VM — Full 3-Tier App on VM"
            - "Ephemeral KIND Cluster (dev / CI use)"
            - "Platform Shared Cluster (namespace only — no new infrastructure)"
          default: three-tier-k8s
        namespace:
          title: Kubernetes Namespace
          type: string
          description: Namespace to create for this application
          pattern: '^[a-z][a-z0-9-]{1,28}[a-z0-9]$'
          default: ipp-appbox-dev

    # ── Page 3: Three-Tier runtime config ─────────────────────────────────────
    - title: "Three-Tier App — Runtime Configuration"
      description: Complete this page when choosing Three-Tier Kubernetes infrastructure.
      properties:
        frontendImage:
          title: Frontend Container Image
          type: string
          default: 'ipp-platform/employee-frontend:latest'
        frontendReplicas:
          title: Frontend Replicas
          type: integer
          default: 1
          minimum: 1
          maximum: 5
        backendImage:
          title: Backend Container Image
          type: string
          default: 'ipp-platform/employee-backend:latest'
        backendReplicas:
          title: Backend Replicas
          type: integer
          default: 1
          minimum: 1
          maximum: 5
        postgresVersion:
          title: PostgreSQL Version
          type: string
          enum: ["14", "15", "16"]
          default: "16"
        databaseStorageGB:
          title: Database Storage (GB)
          type: integer
          default: 5
          minimum: 1
          maximum: 50
        ingressHost:
          title: Ingress Hostname
          type: string
          default: 'myapp.ipp.local'

    # ── Page 4: KubeVirt VM config ────────────────────────────────────────────
    - title: "KubeVirt VM — Sizing"
      description: Complete this page when choosing KubeVirt VM infrastructure.
      properties:
        cpuCores:
          title: vCPU Cores
          type: integer
          default: 2
          minimum: 1
          maximum: 4
        memoryMi:
          title: Memory (MiB)
          type: integer
          default: 2048
          minimum: 512
          maximum: 4096
        vmIngressHost:
          title: Ingress Hostname
          type: string
          default: 'vmapp.ipp.local'

    # ── Page 5: Platform services ─────────────────────────────────────────────
    - title: Platform Services
      properties:
        enableObservability:
          title: Enroll in Observability (Prometheus + Grafana)
          type: boolean
          default: true
        enablePolicies:
          title: Apply Platform Policies (OPA / Kyverno)
          type: boolean
          default: true
        enableCostTracking:
          title: Enable Cost Tracking (OpenCost)
          type: boolean
          default: true
        enableGitOps:
          title: Register in GitOps (Argo CD)
          type: boolean
          default: true
        componentType:
          title: Component Type
          type: string
          enum: [service, website, library]
          default: service
        systemName:
          title: Platform System
          type: string
          default: employee-platform

  steps:
    - id: log-greenfield-request
      name: Log Greenfield Onboarding Request
      action: debug:log
      input:
        message: |
          [Greenfield Onboarding] app=${{ parameters.appName }}
          Team: ${{ parameters.team }} | Env: ${{ parameters.environment }}
          Repo: ${{ parameters.repositoryUrl }}
          Infra: ${{ parameters.infraChoice }} | Namespace: ${{ parameters.namespace }}

    # ── THREE-TIER-K8S ────────────────────────────────────────────────────────
    - id: provision-three-tier
      name: "Provision Three-Tier App (Crossplane)"
      if: ${{ parameters.infraChoice === 'three-tier-k8s' }}
      action: crossplane:apply-claim
      input:
        namespace: ${{ parameters.namespace }}
        manifest:
          apiVersion: platform.iip.com/v1alpha1
          kind: ThreeTierAppClaim
          metadata:
            name: ${{ parameters.appName }}
            namespace: ${{ parameters.namespace }}
            labels:
              app: ${{ parameters.appName }}
              owner: ${{ parameters.team }}
              environment: ${{ parameters.environment }}
              managed-by: backstage-idp
              platform.ipp.dhl.com/environment: ${{ parameters.environment }}
              platform.ipp.dhl.com/team: ${{ parameters.team }}
              platform.ipp.dhl.com/cost-center: ${{ parameters.costCenter }}
              platform.ipp.dhl.com/onboarding-type: greenfield
          spec:
            parameters:
              namespace: ${{ parameters.namespace }}
              frontend:
                image: ${{ parameters.frontendImage }}
                replicas: ${{ parameters.frontendReplicas }}
              backend:
                image: ${{ parameters.backendImage }}
                replicas: ${{ parameters.backendReplicas }}
              database:
                storageGB: ${{ parameters.databaseStorageGB }}
                version: "${{ parameters.postgresVersion }}"
              ingress:
                host: ${{ parameters.ingressHost }}
              owner:
                team: ${{ parameters.team }}
                environment: ${{ parameters.environment }}
                costCenter: ${{ parameters.costCenter }}
            compositionSelector:
              matchLabels:
                platform.iip.com/composition: three-tier-app
            writeConnectionSecretToRef:
              name: ${{ parameters.appName }}-connection

    # ── KUBEVIRT-VM-APP ───────────────────────────────────────────────────────
    - id: provision-kubevirt-vm-app
      name: "Provision KubeVirt VM App (Crossplane)"
      if: ${{ parameters.infraChoice === 'kubevirt-vm-app' }}
      action: crossplane:apply-claim
      input:
        namespace: ${{ parameters.namespace }}
        manifest:
          apiVersion: platform.iip.com/v1alpha1
          kind: VMAppClaim
          metadata:
            name: ${{ parameters.appName }}
            namespace: ${{ parameters.namespace }}
            labels:
              app: ${{ parameters.appName }}
              owner: ${{ parameters.team }}
              environment: ${{ parameters.environment }}
              managed-by: backstage-idp
              platform.ipp.dhl.com/environment: ${{ parameters.environment }}
              platform.ipp.dhl.com/team: ${{ parameters.team }}
              platform.ipp.dhl.com/cost-center: ${{ parameters.costCenter }}
              platform.ipp.dhl.com/onboarding-type: greenfield
          spec:
            parameters:
              vmName: ${{ parameters.appName }}
              namespace: ${{ parameters.namespace }}
              cpuCores: ${{ parameters.cpuCores }}
              memoryMi: ${{ parameters.memoryMi }}
              ingressHost: ${{ parameters.vmIngressHost }}
              owner:
                team: ${{ parameters.team }}
                environment: ${{ parameters.environment }}
                costCenter: ${{ parameters.costCenter }}
            compositionSelector:
              matchLabels:
                platform.iip.com/composition: vm-three-tier-app
            writeConnectionSecretToRef:
              name: ${{ parameters.appName }}-vm-connection

    # ── KIND CLUSTER ──────────────────────────────────────────────────────────
    - id: provision-kind-cluster
      name: "Provision KIND Cluster (Crossplane)"
      if: ${{ parameters.infraChoice === 'kind-cluster' }}
      action: crossplane:apply-claim
      input:
        namespace: crossplane-system
        plural: kindclusterclaims
        manifest:
          apiVersion: platform.iip.com/v1alpha1
          kind: KindClusterClaim
          metadata:
            name: ${{ parameters.appName }}-cluster
            namespace: crossplane-system
            labels:
              platform.ipp.dhl.com/environment: ${{ parameters.environment }}
              platform.ipp.dhl.com/team: ${{ parameters.team }}
              platform.ipp.dhl.com/cost-center: ${{ parameters.costCenter }}
          spec:
            parameters:
              clusterName: ${{ parameters.appName }}-cluster
              nodeCount: 1
              kubernetesVersion: 'v1.31'
              environment: ${{ parameters.environment }}
              ownerTeam: ${{ parameters.team }}
              enableArgoCD: ${{ parameters.enableGitOps }}
              enableMonitoring: ${{ parameters.enableObservability }}
            writeConnectionSecretToRef:
              name: ${{ parameters.appName }}-cluster-kubeconfig

    # ── PLATFORM-SHARED ───────────────────────────────────────────────────────
    - id: log-shared-namespace
      name: "Platform Shared — Namespace Request Logged"
      if: ${{ parameters.infraChoice === 'platform-shared' }}
      action: debug:log
      input:
        message: |
          [Shared Platform] Namespace ${{ parameters.namespace }} requested for ${{ parameters.appName }}.
          No new Crossplane claim — platform engineer will provision namespace and RBAC.
          Team: ${{ parameters.team }} | Cost Center: ${{ parameters.costCenter }}

    - id: log-catalog-registration
      name: Log Catalog Registration
      action: debug:log
      input:
        message: |
          [Catalog] Component: ${{ parameters.appName }}
          Type: ${{ parameters.componentType }} | System: ${{ parameters.systemName }}
          Owner: ${{ parameters.team }} | Lifecycle: experimental

  output:
    links:
      - title: Argo CD — watch provisioning
        url: http://argocd.ipp.local/applications
        icon: web
      - title: View Catalog
        url: http://backstage.ipp.local/catalog
        icon: catalog
    text:
      - title: Greenfield Application Bootstrapped
        content: |
          **Application**: `${{ parameters.appName }}`
          Team: `${{ parameters.team }}` | Env: `${{ parameters.environment }}`
          Infrastructure: `${{ parameters.infraChoice }}`

          **Add `catalog-info.yaml` to `${{ parameters.repositoryUrl }}`:**
          ```yaml
          apiVersion: backstage.io/v1alpha1
          kind: Component
          metadata:
            name: ${{ parameters.appName }}
            annotations:
              backstage.io/source-location: "url:${{ parameters.repositoryUrl }}"
              ipp.dhl.com/cost-center: ${{ parameters.costCenter }}
          spec:
            type: ${{ parameters.componentType }}
            lifecycle: experimental
            owner: ${{ parameters.team }}
            system: ${{ parameters.systemName }}
          ```

          **Platform services enrolled:**
          - Observability: ${{ parameters.enableObservability }}
          - Policies (OPA/Kyverno): ${{ parameters.enablePolicies }}
          - Cost Tracking (OpenCost): ${{ parameters.enableCostTracking }}
          - GitOps (Argo CD): ${{ parameters.enableGitOps }}

---
# ── 5 of 5 ───────────────────────────────────────────────────────────────────
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: yaml-upload-bring-your-own-config
  title: YAML Upload — Bring Your Own Config
  description: >
    Advanced path: paste your InfraRequest YAML and let the platform validate,
    cost-estimate, and provision it via Crossplane. Supports the platform.demo/v1
    InfraRequest schema. For power users and platform engineers who prefer
    declarative configuration over form-based input.
  tags:
    - advanced
    - yaml
    - infrastructure
    - self-service
  annotations:
    ipp.dhl.com/card-category: "Advanced · BYOC"
    ipp.dhl.com/sort-order: "5"
spec:
  owner: platform-engineering
  type: infrastructure

  parameters:
    # ── Page 1: Submission mode ───────────────────────────────────────────────
    - title: How would you like to provide your config?
      required: [submissionMode]
      properties:
        submissionMode:
          title: Submission Mode
          type: string
          enum:
            - paste-yaml
            - interactive-upload
          enumNames:
            - "Paste YAML — enter your InfraRequest manifest below"
            - "Interactive Upload — use the Infra Onboarding portal's drag-and-drop UI"
          default: paste-yaml
          ui:widget: radio

    # ── Page 2: Identity ──────────────────────────────────────────────────────
    - title: Ownership
      required: [ownerTeam]
      properties:
        ownerTeam:
          title: Owner Team
          type: string
          enum: [developers, platform-engineers, operations-support, security-team]
          default: developers
        costCenter:
          title: Cost Center
          type: string
          default: 'demo-001'
        targetNamespace:
          title: Target Namespace
          type: string
          description: Namespace to apply the provisioned resource into
          default: ipp-appbox-dev

    # ── Page 3: YAML content ──────────────────────────────────────────────────
    - title: YAML Configuration
      description: >
        Paste your InfraRequest YAML below (paste-yaml mode) or leave blank
        (interactive-upload mode — you will be redirected to the portal).
      properties:
        yamlContent:
          title: InfraRequest YAML
          type: string
          description: |
            Schema: platform.demo/v1 / InfraRequest
            Required fields: metadata.name, metadata.team, metadata.environment,
            metadata.repository, spec.appType, spec.infra.type
          ui:widget: textarea
          ui:options:
            rows: 20
        # Structured fields extracted from YAML for Crossplane apply
        # These mirror the InfraRequest schema and are used to build the claim
        parsedAppName:
          title: App Name (from YAML metadata.name)
          type: string
          description: >
            Must match metadata.name in your YAML above.
            Used to construct the Crossplane claim — keeps the apply action fully structured.
          pattern: '^[a-z][a-z0-9-]{2,28}[a-z0-9]$'
        parsedAppType:
          title: App Type (from YAML spec.appType)
          type: string
          enum: [greenfield, brownfield]
          default: greenfield
        parsedInfraType:
          title: Infra Type (from YAML spec.infra.type)
          type: string
          enum: [kubernetes, vm]
          default: kubernetes
        parsedEnvironment:
          title: Environment (from YAML metadata.environment)
          type: string
          enum: [development, staging, production]
          default: development
        parsedNodeCount:
          title: Node Count (from YAML spec.infra.kubernetes.nodeCount)
          type: integer
          default: 3
          minimum: 1
          maximum: 20
        parsedNodeSize:
          title: Node Size (from YAML spec.infra.kubernetes.nodeSize)
          type: string
          enum: [small, medium, large]
          default: medium
        parsedRegion:
          title: Region (from YAML spec.infra.kubernetes.region)
          type: string
          enum: [us-east-1, eu-west-1, ap-southeast-1]
          default: eu-west-1

  steps:
    - id: log-yaml-submission
      name: Log YAML Submission
      action: debug:log
      input:
        message: |
          [YAML Upload — BYOC] mode=${{ parameters.submissionMode }}
          Owner: ${{ parameters.ownerTeam }} | Cost Center: ${{ parameters.costCenter }}
          App: ${{ parameters.parsedAppName }} | Type: ${{ parameters.parsedAppType }}
          Infra: ${{ parameters.parsedInfraType }} | Env: ${{ parameters.parsedEnvironment }}

    - id: log-raw-yaml
      name: Record Raw YAML (audit log)
      if: ${{ parameters.submissionMode === 'paste-yaml' }}
      action: debug:log
      input:
        message: |
          --- BEGIN SUBMITTED YAML ---
          ${{ parameters.yamlContent }}
          --- END SUBMITTED YAML ---

    # Apply claim from structured fields (kubernetes path)
    - id: apply-yaml-k8s-claim
      name: "Apply KindClusterClaim from YAML config (kubernetes path)"
      if: ${{ parameters.submissionMode === 'paste-yaml' and parameters.parsedInfraType === 'kubernetes' }}
      action: crossplane:apply-claim
      input:
        namespace: crossplane-system
        plural: kindclusterclaims
        manifest:
          apiVersion: platform.iip.com/v1alpha1
          kind: KindClusterClaim
          metadata:
            name: ${{ parameters.parsedAppName }}
            namespace: crossplane-system
            labels:
              platform.ipp.dhl.com/environment: ${{ parameters.parsedEnvironment }}
              platform.ipp.dhl.com/team: ${{ parameters.ownerTeam }}
              platform.ipp.dhl.com/cost-center: ${{ parameters.costCenter }}
              platform.ipp.dhl.com/app-type: ${{ parameters.parsedAppType }}
              platform.ipp.dhl.com/source: yaml-upload
              managed-by: backstage-idp
          spec:
            parameters:
              clusterName: ${{ parameters.parsedAppName }}
              nodeCount: ${{ parameters.parsedNodeCount }}
              kubernetesVersion: 'v1.31'
              environment: ${{ parameters.parsedEnvironment }}
              ownerTeam: ${{ parameters.ownerTeam }}
              enableArgoCD: true
              enableMonitoring: true
            writeConnectionSecretToRef:
              name: ${{ parameters.parsedAppName }}-kubeconfig

    # Apply claim from structured fields (vm path)
    - id: apply-yaml-vm-claim
      name: "Apply VMAppClaim from YAML config (vm path)"
      if: ${{ parameters.submissionMode === 'paste-yaml' and parameters.parsedInfraType === 'vm' }}
      action: crossplane:apply-claim
      input:
        namespace: ${{ parameters.targetNamespace }}
        manifest:
          apiVersion: platform.iip.com/v1alpha1
          kind: VMAppClaim
          metadata:
            name: ${{ parameters.parsedAppName }}
            namespace: ${{ parameters.targetNamespace }}
            labels:
              platform.ipp.dhl.com/environment: ${{ parameters.parsedEnvironment }}
              platform.ipp.dhl.com/team: ${{ parameters.ownerTeam }}
              platform.ipp.dhl.com/cost-center: ${{ parameters.costCenter }}
              platform.ipp.dhl.com/app-type: ${{ parameters.parsedAppType }}
              platform.ipp.dhl.com/source: yaml-upload
              managed-by: backstage-idp
          spec:
            parameters:
              vmName: ${{ parameters.parsedAppName }}
              namespace: ${{ parameters.targetNamespace }}
              cpuCores: 2
              memoryMi: 2048
              owner:
                team: ${{ parameters.ownerTeam }}
                environment: ${{ parameters.parsedEnvironment }}
                costCenter: ${{ parameters.costCenter }}
            writeConnectionSecretToRef:
              name: ${{ parameters.parsedAppName }}-vm-connection

    - id: log-interactive-redirect
      name: Redirect to Interactive Upload Portal
      if: ${{ parameters.submissionMode === 'interactive-upload' }}
      action: debug:log
      input:
        message: |
          [YAML Upload] User chose interactive upload mode.
          Directing to Infra Onboarding YAML Upload portal at /infra-onboarding.
          Full parse, drag-and-drop validation, real-time cost preview available there.

  output:
    links:
      - title: Infra Onboarding — YAML Upload Portal
        url: http://backstage.ipp.local/infra-onboarding
        icon: web
      - title: Argo CD — watch provisioning
        url: http://argocd.ipp.local/applications
        icon: web
    text:
      - title: YAML Submission Result
        content: |
          **Mode**: `${{ parameters.submissionMode }}`
          **Owner**: `${{ parameters.ownerTeam }}` | **Cost Center**: `${{ parameters.costCenter }}`

          **paste-yaml path:** Claim submitted to Crossplane for `${{ parameters.parsedAppName }}`.
          Monitor:
          ```bash
          # Kubernetes / KIND path
          kubectl get kindclusterclaims ${{ parameters.parsedAppName }} -n crossplane-system
          # VM path
          kubectl get vmappclaims ${{ parameters.parsedAppName }} -n ${{ parameters.targetNamespace }}
          ```

          **interactive-upload path:** Visit the Infra Onboarding portal for drag-and-drop
          YAML upload with real-time schema validation and cost preview:
          [/infra-onboarding](http://backstage.ipp.local/infra-onboarding)

          **YAML Schema Reference (`platform.demo/v1 / InfraRequest`):**
          ```yaml
          apiVersion: platform.demo/v1
          kind: InfraRequest
          metadata:
            name: my-service
            team: platform-engineering
            environment: development
            repository: https://github.com/dhl/my-service
          spec:
            appType: greenfield
            infra:
              type: kubernetes
              kubernetes:
                nodeCount: 3
                nodeSize: medium
                region: eu-west-1
                highAvailability: false
          ```
---
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: day0-gitops-provision
  title: GitOps Infrastructure Provisioning (IIP Service)
  description: >
    Provision infrastructure via GitOps — submits a Crossplane claim through
    @ipp-automation-bot → Gitea → ArgoCD → Crossplane. Conftest-validated before commit.
  tags:
    - gitops
    - crossplane
    - infra
    - argocd
spec:
  owner: platform-engineering
  type: infrastructure

  parameters:
    - title: Claim Details
      required:
        - claimKind
        - claimName
        - targetNamespace
        - environment
      properties:
        claimKind:
          title: Claim Kind
          type: string
          description: Crossplane claim kind to provision
          enum:
            - VMAppClaim
            - ThreeTierAppClaim
            - KindClusterClaim
            - AKSClusterClaim
            - IPPVirtualMachineClaim
            - IPPAppBoxClaim
            - IPPClusterClaim
            - IPPDatabaseClaim
            - IPPNetworkClaim
          default: VMAppClaim
        claimName:
          title: Claim Name
          type: string
          description: Unique name for this infrastructure resource (DNS-safe)
          pattern: '^[a-z][a-z0-9-]{2,39}$'
        targetNamespace:
          title: Target Namespace
          type: string
          default: crossplane-system
        environment:
          title: Environment
          type: string
          enum: [dev, staging, prod]
          default: dev
        cpuCores:
          title: CPU Cores
          type: integer
          default: 1
          minimum: 1
          maximum: 8
        memoryMi:
          title: Memory (MiB)
          type: integer
          default: 1024
          enum: [512, 1024, 2048, 4096]
        diskGi:
          title: Disk (GiB)
          type: integer
          default: 10
          minimum: 5
          maximum: 100

    - title: Ownership & Cost
      required:
        - ownerEmail
        - costCenter
        - businessUnit
        - ownerTeam
      properties:
        ownerEmail:
          title: Owner Email
          type: string
          format: email
        costCenter:
          title: Cost Center
          type: string
          default: demo-001
        businessUnit:
          title: Business Unit
          type: string
          default: bu-demo
        ownerTeam:
          title: Owner Team
          type: string
          default: platform-demo
        requestId:
          title: Request ID (optional)
          type: string
          description: ITSM ticket ID, leave blank to auto-generate

  steps:
    - id: submit-claim
      name: Submit VM Claim via IIP Service
      action: iip:submit-claim
      input:
        manifest:
          apiVersion: platform.iip.com/v1alpha1
          kind: VMAppClaim
          metadata:
            name: ${{ parameters.claimName }}
            namespace: crossplane-system
            labels:
              owner: ${{ parameters.ownerTeam }}
              environment: ${{ parameters.environment }}
          spec:
            compositionSelector:
              matchLabels:
                platform.iip.com/composition: vm-three-tier-app
            parameters:
              vmName: ${{ parameters.claimName }}
              namespace: ipp-appbox-dev
              cpuCores: ${{ parameters.cpuCores }}
              memoryMi: ${{ parameters.memoryMi }}
              diskGi: ${{ parameters.diskGi }}
              ingressHost: vmapp.ipp.local
              owner:
                team: ${{ parameters.ownerTeam }}
                environment: ${{ parameters.environment }}
                costCenter: ${{ parameters.costCenter }}
            writeConnectionSecretToRef:
              name: ${{ parameters.claimName }}-connection
        requestedBy: ${{ parameters.ownerEmail }}
        costCenter: ${{ parameters.costCenter }}
        businessUnit: ${{ parameters.businessUnit }}
        environment: ${{ parameters.environment }}
        requestId: ${{ parameters.requestId }}

  output:
    links:
      - title: Claim in Gitea
        url: ${{ steps['submit-claim'].output.prUrl }}
        icon: github
      - title: ArgoCD — watch sync
        url: http://argocd.ipp.local/applications/${{ steps['submit-claim'].output.argoCDApp }}
        icon: web
      - title: Gitea Repo
        url: http://gitea.ipp.local/ipp-automation-bot/ipp-platform-claims
        icon: web
    text:
      - title: Provisioning Started
        content: |
          **Claim**: `${{ steps['submit-claim'].output.claimName }}`
          **Path**: `${{ steps['submit-claim'].output.claimPath }}`
          **ArgoCD App**: `${{ steps['submit-claim'].output.argoCDApp }}`

          ${{ steps['submit-claim'].output.message }}

          Monitor readiness:
          ```bash
          kubectl get vmappclaim ${{ parameters.claimName }} -n crossplane-system -w
          ```
---
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: day2-destroy-gitops-claim
  title: Day 2 — Destroy GitOps Infrastructure Claim
  description: >
    Delete a provisioned GitOps claim from Gitea. ArgoCD detects the deletion
    and prunes the Crossplane resource from the cluster within ~30s.
  tags: [infrastructure, day2, gitops, destroy]
spec:
  owner: platform-engineering
  type: infrastructure
  parameters:
    - title: Identify the Claim to Destroy
      required: [claimName, ownerEmail]
      properties:
        claimName:
          title: Claim Name
          type: string
          description: Exact name used when the claim was provisioned (e.g. test2026)
          ui:autofocus: true
        claimKind:
          title: Claim Kind
          type: string
          default: VMAppClaim
          enum: [VMAppClaim, ThreeTierAppClaim, KindClusterClaim, AKSClusterClaim]
          enumNames:
            - VMAppClaim (KubeVirt VM)
            - ThreeTierAppClaim (3-Tier App)
            - KindClusterClaim (KIND Cluster)
            - AKSClusterClaim (AKS Cluster)
        businessUnit:
          title: Business Unit
          type: string
          default: bu-demo
        environment:
          title: Environment
          type: string
          default: dev
          enum: [dev, staging, prod]
        ownerEmail:
          title: Your Email
          type: string
          ui:widget: email
        confirm:
          title: Type "destroy" to confirm
          type: string
          description: >
            This permanently deletes the claim from Gitea. Crossplane will
            deprovision all managed resources. Type exactly: destroy
          ui:help: 'Type exactly: destroy'
      dependencies:
        confirm:
          oneOf:
            - properties:
                confirm:
                  pattern: '^destroy$'
              required: [confirm]

  steps:
    - id: destroy-claim
      name: Delete GitOps Claim via IIP Service
      action: iip:destroy-claim
      input:
        claimName:    ${{ parameters.claimName }}
        claimKind:    ${{ parameters.claimKind }}
        businessUnit: ${{ parameters.businessUnit }}
        environment:  ${{ parameters.environment }}
        requestedBy:  ${{ parameters.ownerEmail }}

  output:
    links:
      - title: Gitea Repo
        url: http://gitea.ipp.local/ipp-automation-bot/ipp-platform-claims
        icon: github
      - title: ArgoCD — watch prune
        url: http://argocd.ipp.local/applications
        icon: web
    text:
      - title: Claim Destroyed
        content: |
          **Claim**: `${{ steps['destroy-claim'].output.claimName }}`
          **Deleted path**: `${{ steps['destroy-claim'].output.claimPath }}`

          ${{ steps['destroy-claim'].output.message }}

          Verify removal:
          ```bash
          kubectl get vmappclaim ${{ parameters.claimName }} -n crossplane-system
          ```
