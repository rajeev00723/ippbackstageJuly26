apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: provision-kind-cluster
  title: Provision Kubernetes Cluster (KIND)
  description: >
    Provision a new KIND (Kubernetes in Docker) cluster on the DPCS platform
    via Crossplane. Creates a fully configured cluster with kubeconfig secret,
    namespace isolation, RBAC, and optional Argo CD auto-registration.
    Ideal for ephemeral dev/test environments and CI pipelines.
  tags:
    - kubernetes
    - kind
    - cluster
    - crossplane
    - self-service
    - infrastructure
    - _deprecated
  annotations:
    ipp.dhl.com/deprecated: "true"
    ipp.dhl.com/superseded-by: day0-provision-infrastructure
    ipp.dhl.com/deprecation-note: "Use Day 0 — Provision New Infrastructure (infraType: kind-cluster)"
spec:
  owner: platform-engineers
  type: infrastructure

  parameters:
    - title: Cluster Details
      required: [clusterName, environment, ownerTeam]
      properties:
        clusterName:
          title: Cluster Name
          type: string
          description: Unique cluster name (lowercase, alphanumeric, hyphens only)
          pattern: '^[a-z][a-z0-9-]{2,28}[a-z0-9]$'
          ui:autofocus: true
        environment:
          title: Target Environment
          type: string
          enum: [dev, staging, prod]
          default: dev
          description: Cluster tier — affects resource quotas and retention policy
        ownerTeam:
          title: Owner Team
          type: string
          description: Team responsible for this cluster
          default: platform-engineers
        costCenter:
          title: Cost Center
          type: string
          description: OpenCost chargeback code
          default: 'demo-001'

    - title: Cluster Configuration
      properties:
        nodeCount:
          title: Worker Nodes
          type: integer
          minimum: 1
          maximum: 5
          default: 1
          description: Number of KIND worker nodes (1–5)
        kubernetesVersion:
          title: Kubernetes Version
          type: string
          enum:
            - 'v1.31'
            - 'v1.30'
            - 'v1.29'
          default: 'v1.31'
          description: KIND node image Kubernetes version
        enableArgoCD:
          title: Register with Argo CD
          type: boolean
          default: true
          description: Automatically register this cluster as an Argo CD destination
        enableMonitoring:
          title: Enable Prometheus Scraping
          type: boolean
          default: true
          description: Install kube-state-metrics and enable Prometheus remote write

  steps:
    - id: log-params
      name: Log Parameters
      action: debug:log
      input:
        message: |
          Creating KIND cluster: ${{ parameters.clusterName }}
          Environment: ${{ parameters.environment }}
          Nodes: ${{ parameters.nodeCount }}
          K8s Version: ${{ parameters.kubernetesVersion }}
          Owner: ${{ parameters.ownerTeam }}
          Argo CD: ${{ parameters.enableArgoCD }}

    - id: apply-cluster-claim
      name: Apply KIND Cluster Claim via Crossplane
      action: crossplane:apply-claim
      input:
        namespace: crossplane-system
        plural: kindclusterclaims
        manifest:
          apiVersion: platform.iip.com/v1alpha1
          kind: KindClusterClaim
          metadata:
            name: ${{ parameters.clusterName }}
            namespace: crossplane-system
            labels:
              platform.dpcs.io/environment: ${{ parameters.environment }}
              platform.dpcs.io/team: ${{ parameters.ownerTeam }}
              platform.dpcs.io/cost-center: ${{ parameters.costCenter }}
          spec:
            parameters:
              clusterName: ${{ parameters.clusterName }}
              nodeCount: ${{ parameters.nodeCount }}
              kubernetesVersion: ${{ parameters.kubernetesVersion }}
              environment: ${{ parameters.environment }}
              ownerTeam: ${{ parameters.ownerTeam }}
              enableArgoCD: ${{ parameters.enableArgoCD }}
              enableMonitoring: ${{ parameters.enableMonitoring }}
            writeConnectionSecretToRef:
              name: ${{ parameters.clusterName }}-kubeconfig

  output:
    links:
      - title: Argo CD — watch cluster registration
        url: http://argocd.dpcs.local
        icon: web
      - title: What happens next
        icon: docs
        text: |
          Cluster provisioned: **${{ parameters.clusterName }}**

          Crossplane is creating:
          - KIND cluster with ${{ parameters.nodeCount }} worker node(s)
          - Kubernetes ${{ parameters.kubernetesVersion }}
          - Kubeconfig secret: `${{ parameters.clusterName }}-kubeconfig`
          - Namespace: `${{ parameters.ownerTeam }}`
          - RBAC bindings for team `${{ parameters.ownerTeam }}`
          ${{ parameters.enableArgoCD === true && '- Argo CD cluster registration' || '' }}
          ${{ parameters.enableMonitoring === true && '- Prometheus scrape target' || '' }}

          Monitor provisioning:
          ```
          kubectl get kindclusterclaims -A
          kubectl get secret ${{ parameters.clusterName }}-kubeconfig -n ${{ parameters.ownerTeam }}
          ```

          Connect to your cluster:
          ```
          kubectl get secret ${{ parameters.clusterName }}-kubeconfig \
            -n ${{ parameters.ownerTeam }} \
            -o jsonpath='{.data.kubeconfig}' | base64 -d > ~/.kube/${{ parameters.clusterName }}.yaml
          export KUBECONFIG=~/.kube/${{ parameters.clusterName }}.yaml
          kubectl get nodes
          ```
---
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: provision-azure-aks-tiny
  title: Provision Azure AKS Tiny Cluster
  description: >
    Provision a lightweight Azure Kubernetes Service (AKS) cluster via
    Crossplane + provider-azure. Creates a dedicated Resource Group,
    Virtual Network, Subnet, and a 1–3 node AKS cluster (Standard_D2s_v7 by
    default). Kubeconfig is stored as a Kubernetes Secret and optionally
    registered with Argo CD. Requires Azure credentials in the
    crossplane-system/azure-creds Secret.
  tags:
    - azure
    - aks
    - kubernetes
    - crossplane
    - cloud
    - self-service
    - infrastructure
    - _deprecated
  annotations:
    ipp.dhl.com/deprecated: "true"
    ipp.dhl.com/superseded-by: day0-provision-infrastructure
    ipp.dhl.com/deprecation-note: "Use Day 0 — Provision New Infrastructure (infraType: azure-aks)"
spec:
  owner: platform-engineers
  type: infrastructure

  parameters:
    - title: Cluster Identity
      required: [clusterName, environment, ownerTeam]
      properties:
        clusterName:
          title: Cluster Name
          type: string
          description: Unique name for the AKS cluster (lowercase, alphanumeric, hyphens)
          pattern: '^[a-z][a-z0-9-]{2,28}[a-z0-9]$'
          ui:autofocus: true
          ui:help: 'e.g. dev-aks-01, ml-staging, ci-ephemeral'
        environment:
          title: Target Environment
          type: string
          enum: [dev, staging, prod]
          default: dev
          description: Affects tags and retention policy
        ownerTeam:
          title: Owner Team
          type: string
          enum: [developers, platform-engineers, operations-support, security-team]
          default: developers
        costCenter:
          title: Cost Center
          type: string
          default: demo-001
          description: OpenCost / Azure cost-allocation tag

    - title: Azure Configuration
      required: [location]
      properties:
        location:
          title: Azure Region
          type: string
          enum:
            - eastus
            - eastus2
            - westus2
            - westeurope
            - northeurope
            - southeastasia
          default: eastus
          description: Azure region where the cluster will be created
        kubernetesVersion:
          title: Kubernetes Version
          type: string
          enum:
            - "1.29"
            - "1.30"
            - "1.31"
          default: "1.29"
          description: AKS Kubernetes version

    - title: Node Pool Sizing
      properties:
        nodeCount:
          title: Node Count
          type: integer
          minimum: 1
          maximum: 3
          default: 1
          description: Number of nodes in the default pool (keep at 1 for "tiny")
        nodeVmSize:
          title: VM Size
          type: string
          enum:
            - Standard_D2s_v7
            - Standard_D4s_v7
            - Standard_D2ds_v7
            - Standard_D4ds_v7
          default: Standard_D2s_v7
          description: Standard_D2s_v7 = 2 vCPU / 8 GB RAM

    - title: Platform Integration
      properties:
        enableArgoCD:
          title: Register with Argo CD
          type: boolean
          default: true
          description: Store kubeconfig and register this cluster as an Argo CD destination
        enableMonitoring:
          title: Enable Azure Monitor
          type: boolean
          default: false
          description: Enable Azure Monitor / Container Insights (incurs extra Azure cost)

  steps:
    - id: log-params
      name: Log Parameters
      action: debug:log
      input:
        message: |
          Provisioning Azure AKS cluster: ${{ parameters.clusterName }}
          Region:      ${{ parameters.location }}
          K8s version: ${{ parameters.kubernetesVersion }}
          Nodes:       ${{ parameters.nodeCount }} × ${{ parameters.nodeVmSize }}
          Owner:       ${{ parameters.ownerTeam }} | Env: ${{ parameters.environment }}
          Cost Center: ${{ parameters.costCenter }}
          Argo CD:     ${{ parameters.enableArgoCD }}

    - id: apply-aks-claim
      name: Apply AKSClusterClaim via Crossplane
      action: crossplane:apply-claim
      input:
        namespace: crossplane-system
        plural: aksclaims
        manifest:
          apiVersion: platform.iip.com/v1alpha1
          kind: AKSClusterClaim
          metadata:
            name: ${{ parameters.clusterName }}
            namespace: crossplane-system
            labels:
              platform.dpcs.io/environment: ${{ parameters.environment }}
              platform.dpcs.io/team: ${{ parameters.ownerTeam }}
              platform.dpcs.io/cost-center: ${{ parameters.costCenter }}
              platform.dpcs.io/cloud: azure
              managed-by: backstage-idp
          spec:
            parameters:
              clusterName: ${{ parameters.clusterName }}
              location: ${{ parameters.location }}
              kubernetesVersion: "${{ parameters.kubernetesVersion }}"
              nodeCount: ${{ parameters.nodeCount }}
              nodeVmSize: ${{ parameters.nodeVmSize }}
              environment: ${{ parameters.environment }}
              ownerTeam: ${{ parameters.ownerTeam }}
              costCenter: ${{ parameters.costCenter }}
            compositionSelector:
              matchLabels:
                platform.iip.com/composition: aks-cluster
            writeConnectionSecretToRef:
              name: ${{ parameters.clusterName }}-kubeconfig

  output:
    links:
      - title: Argo CD — watch AKS provisioning
        url: http://argocd.dpcs.local/applications
        icon: web
    text:
      - title: What happens next
        content: |
          **AKSClusterClaim created**: `${{ parameters.clusterName }}`

          Crossplane is now provisioning on Azure (${{ parameters.location }}):
          - Resource Group: `rg-${{ parameters.clusterName }}`
          - Virtual Network: `vnet-${{ parameters.clusterName }}` (10.0.0.0/16)
          - Subnet: `subnet-${{ parameters.clusterName }}` (10.0.1.0/24)
          - AKS Cluster: `${{ parameters.clusterName }}` — ${{ parameters.nodeCount }} × ${{ parameters.nodeVmSize }}, K8s ${{ parameters.kubernetesVersion }}
          - Kubeconfig Secret: `${{ parameters.clusterName }}-kubeconfig` (crossplane-system)

          > **Typical provisioning time: 8–15 minutes.**

          Monitor via Crossplane:
          ```
          kubectl get aksclaims -A
          kubectl describe akscluster ${{ parameters.clusterName }}
          ```

          Retrieve kubeconfig once READY=True:
          ```
          kubectl get secret ${{ parameters.clusterName }}-kubeconfig \
            -n crossplane-system \
            -o jsonpath='{.data.kubeconfig}' | base64 -d \
            > ~/.kube/${{ parameters.clusterName }}-azure.yaml
          export KUBECONFIG=~/.kube/${{ parameters.clusterName }}-azure.yaml
          kubectl get nodes
          ```

          Estimated Azure cost (${{ parameters.nodeVmSize }} × ${{ parameters.nodeCount }} node, ${{ parameters.location }}):
          ~$0.096/hr per node (Standard_D2s_v7, ~$70/month at 100% utilisation). Destroy when done.
---
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: destroy-azure-aks-cluster
  title: Destroy Azure AKS Cluster
  description: >
    Delete an AKSClusterClaim. Crossplane will cascade-delete the AKS cluster,
    subnet, virtual network, and resource group from Azure. This is irreversible.
  tags:
    - azure
    - aks
    - destroy
    - crossplane
    - _deprecated
  annotations:
    ipp.dhl.com/deprecated: "true"
    ipp.dhl.com/superseded-by: day2-modify-infrastructure
    ipp.dhl.com/deprecation-note: "Use Day 2 — Modify Existing Infrastructure (changeType: destroy-aks)"
spec:
  owner: platform-engineers
  type: infrastructure

  parameters:
    - title: Cluster to Destroy
      required: [clusterName, confirmDestroy]
      properties:
        clusterName:
          title: Cluster Name
          type: string
          description: Name of the AKSClusterClaim to delete
          ui:autofocus: true
        confirmDestroy:
          title: Type "destroy" to confirm
          type: string
          description: All Azure resources including the cluster and VNet will be permanently deleted.
          ui:help: 'Type the word "destroy" to confirm'

  steps:
    - id: log-destroy
      name: Log Destroy Request
      action: debug:log
      input:
        message: 'Destroying AKS cluster: ${{ parameters.clusterName }}'

    - id: delete-aks-claim
      name: Delete AKSClusterClaim
      action: kubernetes:delete-resource
      input:
        apiVersion: platform.iip.com/v1alpha1
        kind: AKSClusterClaim
        name: ${{ parameters.clusterName }}
        namespace: crossplane-system
        plural: aksclaims

  output:
    text:
      - title: Destruction initiated
        content: |
          **AKSClusterClaim deleted**: `${{ parameters.clusterName }}`

          Crossplane is now removing all Azure resources:
          - AKS cluster `${{ parameters.clusterName }}`
          - Subnet, Virtual Network, Resource Group

          Monitor:
          ```
          kubectl get aksclaims -A
          ```
---
