        ownerTeam:
          title: Owner Team
          type: string
          enum: [developers, platform-engineers, operations-support, security-team]
          default: platform-engineers
        environment:
          title: Target Environment
          type: string
          enum: [dev, staging, prod]
          default: dev
        costCenter:
          title: Cost Center
          type: string
          default: 'demo-001'
          description: OpenCost chargeback code

    - title: VM Sizing
      properties:
        cpuCores:
          title: vCPU Cores
          type: integer
          default: 2
          minimum: 1
          maximum: 8
        memoryMi:
          title: Memory (MiB)
          type: integer
          default: 2048
          minimum: 512
          maximum: 8192
        diskGi:
          title: Root Disk (GiB)
          type: integer
          default: 20
          minimum: 10
          maximum: 100

  steps:
    - id: log-params
      name: Log VM Request
      action: debug:log
      input:
        message: |
          Deploying KubeVirt VM: ${{ parameters.vmName }}
          Namespace: ${{ parameters.namespace }}
          vCPU: ${{ parameters.cpuCores }} | RAM: ${{ parameters.memoryMi }} MiB | Disk: ${{ parameters.diskGi }} GiB

    - id: apply-vm-claim
