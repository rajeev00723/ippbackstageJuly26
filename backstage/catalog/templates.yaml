apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: three-tier-enterprise-app
  title: Provision Three-Tier Application via Crossplane
  description: >
    Provision a complete three-tier application (React frontend, Go backend,
    PostgreSQL) directly onto the cluster via Upbound Crossplane. Creates a
    dedicated namespace with zero-trust networking (Cilium), policy enforcement
    (OPA + Kyverno), and cost tracking (OpenCost). No GitHub required.
  tags:
    - kubernetes
    - crossplane
    - enterprise
    - three-tier
    - postgresql
    - self-service
    - _deprecated
  annotations:
    ipp.dhl.com/deprecated: "true"
    ipp.dhl.com/superseded-by: day0-provision-infrastructure
    ipp.dhl.com/deprecation-note: "Use Day 0 — Provision New Infrastructure (infraType: three-tier-k8s)"
spec:
  owner: platform-engineers
  type: service

  parameters:
    - title: Application Details
      required: [applicationName, namespace, environment, ownerTeam]
      properties:
        applicationName:
          title: Application Name
          type: string
          description: Unique name (lowercase, alphanumeric, hyphens only)
          pattern: '^[a-z][a-z0-9-]{2,28}[a-z0-9]$'
          ui:autofocus: true
          ui:help: 'e.g. payments-api, hr-portal, data-pipeline'
        namespace:
          title: Kubernetes Namespace
          type: string
          description: Namespace to create for this application
          pattern: '^[a-z][a-z0-9-]{1,28}[a-z0-9]$'
          ui:help: 'Will be created if it does not exist'
        environment:
          title: Target Environment
          type: string
          enum: [dev, staging, prod]
          default: dev
        ownerTeam:
          title: Owner Team
          type: string
          enum: [developers, platform-engineers, operations-support, security-team]
          default: developers
        costCenter:
          title: Cost Center
          type: string
          default: 'demo-001'
          description: 'Cost center code for billing tracking'

    - title: Frontend Configuration
      properties:
        frontendImage:
          title: Frontend Container Image
          type: string
          default: 'idp-demo/employee-frontend:latest'
        frontendReplicas:
          title: Frontend Replicas
          type: integer
          default: 1
          minimum: 1
          maximum: 5

    - title: Backend Configuration
      properties:
        backendImage:
          title: Backend Container Image
          type: string
          default: 'idp-demo/employee-backend:latest'
        backendReplicas:
          title: Backend Replicas
          type: integer
          default: 1
          minimum: 1
          maximum: 5

    - title: Database Configuration
      properties:
        postgresVersion:
          title: PostgreSQL Version
          type: string
          enum: ["14", "15", "16"]
          default: "16"
        databaseStorageGB:
          title: Database Storage (GB)
          type: integer
          default: 5
          minimum: 1
          maximum: 50

    - title: Networking
      properties:
        ingressHost:
          title: Ingress Hostname
          type: string
          default: 'myapp.dpcs.local'
          description: 'Must resolve to the cluster — add to /etc/hosts if needed'

  steps:
    - id: log-params
      name: Log Parameters
      action: debug:log
      input:
        message: |
          Provisioning: ${{ parameters.applicationName }} in ${{ parameters.namespace }}
          Owner: ${{ parameters.ownerTeam }} | Env: ${{ parameters.environment }}
          Cost Center: ${{ parameters.costCenter }}
          Frontend: ${{ parameters.frontendImage }} x${{ parameters.frontendReplicas }}
          Backend:  ${{ parameters.backendImage }} x${{ parameters.backendReplicas }}
          Database: PostgreSQL v${{ parameters.postgresVersion }}, ${{ parameters.databaseStorageGB }}GB
          Ingress:  http://${{ parameters.ingressHost }}

    - id: apply-claim
      name: Apply Crossplane ThreeTierAppClaim
      action: crossplane:apply-claim
      input:
        namespace: ${{ parameters.namespace }}
        manifest:
          apiVersion: platform.iip.com/v1alpha1
          kind: ThreeTierAppClaim
          metadata:
            name: ${{ parameters.applicationName }}
            namespace: ${{ parameters.namespace }}
            labels:
              app: ${{ parameters.applicationName }}
              owner: ${{ parameters.ownerTeam }}
              environment: ${{ parameters.environment }}
              managed-by: backstage-idp
          spec:
            parameters:
              namespace: ${{ parameters.namespace }}
              frontend:
                image: ${{ parameters.frontendImage }}
                replicas: ${{ parameters.frontendReplicas }}
              backend:
                image: ${{ parameters.backendImage }}
                replicas: ${{ parameters.backendReplicas }}
              database:
                storageGB: ${{ parameters.databaseStorageGB }}
                version: "${{ parameters.postgresVersion }}"
              ingress:
                host: ${{ parameters.ingressHost }}
              owner:
                team: ${{ parameters.ownerTeam }}
                environment: ${{ parameters.environment }}
                costCenter: ${{ parameters.costCenter }}
            compositionSelector:
              matchLabels:
                platform.iip.com/composition: three-tier-app
            writeConnectionSecretToRef:
              name: ${{ parameters.applicationName }}-connection

  output:
    links:
      - title: Argo CD — watch provisioning
        url: http://argocd.dpcs.local/applications
        icon: web
    text:
      - title: What happens next
        content: |
          **Claim created**: `${{ parameters.applicationName }}` in namespace `${{ parameters.namespace }}`

          Crossplane is now processing the claim and will provision:
          - Kubernetes namespace `${{ parameters.namespace }}`
          - Frontend deployment (${{ parameters.frontendReplicas }} replica(s))
          - Backend deployment (${{ parameters.backendReplicas }} replica(s))
          - PostgreSQL StatefulSet (v${{ parameters.postgresVersion }}, ${{ parameters.databaseStorageGB }}GB)
          - Ingress at **http://${{ parameters.ingressHost }}**
          - Cilium network policies (zero-trust)
          - Resource quotas and limit ranges

          Monitor progress:
          ```
          kubectl get threetierappclaims -n ${{ parameters.namespace }}
          kubectl -n ${{ parameters.namespace }} get pods -w
          ```

---
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: destroy-three-tier-app
  title: Destroy Three-Tier Application
  description: >
    Destroys a previously provisioned three-tier application by deleting
    the Crossplane ThreeTierAppClaim. Crossplane will cascade-delete all
    managed resources (namespace, deployments, services, ingress, network policies).
  tags:
    - kubernetes
    - crossplane
    - destroy
    - self-service
    - _deprecated
  annotations:
    ipp.dhl.com/deprecated: "true"
    ipp.dhl.com/superseded-by: day2-modify-infrastructure
    ipp.dhl.com/deprecation-note: "Use Day 2 — Modify Existing Infrastructure (changeType: destroy-three-tier)"
spec:
  owner: platform-engineers
  type: service

  parameters:
    - title: Application to Destroy
      required: [applicationName, namespace, confirmDestroy]
      properties:
        applicationName:
          title: Application Name
          type: string
          description: Name of the ThreeTierAppClaim to delete
          ui:autofocus: true
        namespace:
          title: Namespace
          type: string
          description: Namespace where the claim was created
        confirmDestroy:
          title: Type "destroy" to confirm
          type: string
          description: This action is irreversible. All resources including the database will be deleted.
          ui:help: 'Type the word "destroy" to confirm'

  steps:
    - id: validate-confirm
      name: Validate Confirmation
      action: debug:log
      input:
        message: 'Destroying application: ${{ parameters.applicationName }} in ${{ parameters.namespace }}'

    - id: delete-claim
      name: Delete ThreeTierAppClaim
      action: kubernetes:delete-resource
      input:
        apiVersion: platform.iip.com/v1alpha1
        kind: ThreeTierAppClaim
        name: ${{ parameters.applicationName }}
        namespace: ${{ parameters.namespace }}

  output:
    text:
      - title: Destruction initiated
        content: |
          **Claim deleted**: `${{ parameters.applicationName }}` in namespace `${{ parameters.namespace }}`

          Crossplane is now deleting all managed resources:
          - Namespace `${{ parameters.namespace }}`
          - All Deployments, Services, and Ingresses
          - PostgreSQL StatefulSet and PVC
          - Cilium network policies

          Monitor:
          ```
          kubectl get threetierappclaims -A
          kubectl get ns ${{ parameters.namespace }}
          ```

