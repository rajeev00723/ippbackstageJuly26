apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: scale-application
  title: Scale Application Deployment
  description: >
    Scale the frontend or backend replicas of a provisioned three-tier application.
    Uses the Crossplane claim update to trigger reconciliation.
  tags:
    - kubernetes
    - day2
    - scale
    - operations
    - _deprecated
  annotations:
    ipp.dhl.com/deprecated: "true"
    ipp.dhl.com/superseded-by: day2-modify-infrastructure
    ipp.dhl.com/deprecation-note: "Use Day 2 — Modify Existing Infrastructure (changeType: scale)"
spec:
  owner: platform-engineers
  type: service

  parameters:
    - title: Scale Configuration
      required: [applicationName, namespace, component, replicas]
      properties:
        applicationName:
          title: Application Name
          type: string
          description: Name of the application to scale
          ui:autofocus: true
        namespace:
          title: Namespace
          type: string
          description: Application namespace
        component:
          title: Component to Scale
          type: string
          enum: [frontend, backend]
          default: frontend
          description: Which component to scale
        replicas:
          title: Number of Replicas
          type: integer
          minimum: 1
          maximum: 10
          default: 2
          description: Desired replica count

  steps:
    - id: log-scale
      name: Log Scale Operation
      action: debug:log
      input:
        message: 'Scaling ${{ parameters.component }} of ${{ parameters.applicationName }} to ${{ parameters.replicas }} replicas'

    - id: scale-deployment
      name: Apply Scale via Kubernetes
      action: crossplane:apply-claim
      input:
        namespace: ${{ parameters.namespace }}
        manifest:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: ${{ parameters.applicationName }}-${{ parameters.component }}
            namespace: ${{ parameters.namespace }}
          spec:
            replicas: ${{ parameters.replicas }}

  output:
    text:
      - title: Scale operation submitted
        content: |
          **${{ parameters.component }}** scaled to **${{ parameters.replicas }}** replicas.

          Monitor:
          ```
          kubectl -n ${{ parameters.namespace }} get deploy ${{ parameters.applicationName }}-${{ parameters.component }} -w
          ```

