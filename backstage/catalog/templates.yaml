spec:
  owner: platform-engineers
  type: infrastructure

  parameters:
    - title: VM Identity
      required: [vmName, namespace, ownerTeam, environment]
      properties:
        vmName:
          title: VM Name
          type: string
          description: Unique name for the VirtualMachine (lowercase, alphanumeric, hyphens)
          pattern: '^[a-z][a-z0-9-]{1,28}[a-z0-9]$'
