apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: provision-kubevirt-vm-app
  title: Provision KubeVirt VM + Deploy 3-Tier App
  description: >
    Provision a KubeVirt VirtualMachine via Crossplane and automatically
    deploy the 3-tier employee application (nginx frontend, Python API,
    PostgreSQL) on the VM using cloud-init. The VM is a single Fedora
    instance running all tiers — mirrors a traditional VM-based deployment
    alongside the Kubernetes pod-based path.
  tags:
    - kubevirt
    - vm
    - crossplane
    - three-tier
    - self-service
    - _deprecated
  annotations:
    ipp.dhl.com/deprecated: "true"
    ipp.dhl.com/superseded-by: day0-provision-infrastructure
    ipp.dhl.com/deprecation-note: "Use Day 0 — Provision New Infrastructure (infraType: kubevirt-vm-app)"
spec:
  owner: platform-engineers
  type: service

  parameters:
    - title: VM Identity
      required: [vmName, namespace, ownerTeam, environment]
      properties:
        vmName:
          title: VM Name
          type: string
          description: Unique name for the VirtualMachine (lowercase, alphanumeric, hyphens)
          pattern: '^[a-z][a-z0-9-]{1,28}[a-z0-9]$'
          ui:autofocus: true
          ui:help: 'e.g. employee-vm-dev, hr-vm-prod'
        namespace:
          title: Kubernetes Namespace
          type: string
          description: Dedicated namespace for this VM — must NOT be a system namespace (kubevirt, kube-system, crossplane-system, argocd, backstage, etc.)
          default: vmapp-dev
          pattern: '^(?!kubevirt$|kube-system$|kube-public$|crossplane-system$|argocd$|backstage$|monitoring$|cilium$|spire$|gatekeeper-system$|kyverno$|vault$|opencost$|aiops$|ingress-nginx$|default$)[a-z][a-z0-9-]{1,28}[a-z0-9]$'
          ui:help: 'Use a dedicated name like vmapp-dev or employee-vm-staging. Never use kubevirt or other system namespaces.'
        ownerTeam:
          title: Owner Team
          type: string
          enum: [developers, platform-engineers, operations-support, security-team]
          default: developers
        environment:
          title: Target Environment
          type: string
          enum: [dev, staging, prod]
          default: dev
        costCenter:
          title: Cost Center
          type: string
          default: 'demo-001'

    - title: VM Sizing
      properties:
        cpuCores:
          title: vCPU Cores
          type: integer
          default: 2
          minimum: 1
          maximum: 4
          description: Number of virtual CPU cores
        memoryMi:
          title: Memory (MiB)
          type: integer
          default: 2048
          minimum: 512
          maximum: 4096
          description: VM RAM in MiB (1024 = 1 GiB, 2048 = 2 GiB)

    - title: Networking
      properties:
        ingressHost:
          title: Ingress Hostname
          type: string
          default: 'vmapp.dpcs.local'
          description: 'Must resolve to the cluster — add to /etc/hosts if needed'

  steps:
    - id: log-params
      name: Log VM Provisioning Request
      action: debug:log
      input:
        message: |
          Provisioning KubeVirt VM: ${{ parameters.vmName }}
          Namespace: ${{ parameters.namespace }}
          Owner: ${{ parameters.ownerTeam }} | Env: ${{ parameters.environment }}
          vCPU: ${{ parameters.cpuCores }} cores | RAM: ${{ parameters.memoryMi }} MiB
          Ingress: http://${{ parameters.ingressHost }}
          Target: Single VM running nginx + Python API + PostgreSQL via cloud-init

    - id: apply-vm-claim
      name: Apply VMAppClaim via Crossplane
      action: crossplane:apply-claim
      input:
        namespace: ${{ parameters.namespace }}
        manifest:
          apiVersion: platform.iip.com/v1alpha1
          kind: VMAppClaim
          metadata:
            name: ${{ parameters.vmName }}
            namespace: ${{ parameters.namespace }}
            labels:
              app: ${{ parameters.vmName }}
              owner: ${{ parameters.ownerTeam }}
              environment: ${{ parameters.environment }}
              managed-by: backstage-idp
              target: kubevirt-vm
          spec:
            parameters:
              vmName: ${{ parameters.vmName }}
              namespace: ${{ parameters.namespace }}
              cpuCores: ${{ parameters.cpuCores }}
              memoryMi: ${{ parameters.memoryMi }}
              ingressHost: ${{ parameters.ingressHost }}
              owner:
                team: ${{ parameters.ownerTeam }}
                environment: ${{ parameters.environment }}
                costCenter: ${{ parameters.costCenter }}
            compositionSelector:
              matchLabels:
                platform.iip.com/composition: vm-three-tier-app
            writeConnectionSecretToRef:
              name: ${{ parameters.vmName }}-vm-connection

  output:
    links:
      - title: Argo CD — watch VM provisioning
        url: http://argocd.dpcs.local/applications
        icon: web
      - title: Employee Portal on VM
        url: http://vmapp.dpcs.local
        icon: web
    text:
      - title: What happens next
        content: |
          **VMAppClaim created**: `${{ parameters.vmName }}` in namespace `${{ parameters.namespace }}`

          Crossplane is now provisioning via KubeVirt:
          - Kubernetes namespace `${{ parameters.namespace }}`
          - KubeVirt VirtualMachine `${{ parameters.vmName }}` (${{ parameters.cpuCores }} vCPU, ${{ parameters.memoryMi }} MiB RAM)
          - Fedora Cloud base image with cloud-init bootstrapping
          - **cloud-init installs**: PostgreSQL (podman), Python API backend, nginx frontend
          - ClusterIP Service + nginx Ingress at **http://${{ parameters.ingressHost }}**

          The VM takes **3–5 minutes** to boot and initialise all services.

          Monitor progress:
          ```
          kubectl get vmappclaims -n ${{ parameters.namespace }}
          kubectl -n ${{ parameters.namespace }} get vmi -w
          virtctl console ${{ parameters.vmName }} -n ${{ parameters.namespace }}
          ```

