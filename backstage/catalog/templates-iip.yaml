# =============================================================================
# IPP — IIP GitOps Scaffolder Templates
# These templates call IIP middleware (via Backstage proxy) which writes
# Crossplane XR claims to ipp-platform-claims/ via PR → Argo CD → Crossplane.
#
# Architecture: DHL_IIP_GitOps_Repository_Architecture.docx
# Backstage approach: Approach G (config overlay, no core modification)
# Proxy endpoint: /api/proxy/iip → http://localhost:3001
# =============================================================================

# ── 1 of 6 — Kubernetes Cluster ───────────────────────────────────────────────
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: iip-provision-cluster
  title: "[IIP] Provision Kubernetes Cluster"
  description: >
    Provision a Kubernetes cluster via IIP GitOps flow.
    IIP writes a Crossplane XIPPCluster claim to Git → Argo CD syncs →
    Crossplane reconciles (KIND locally, AKS on Azure).
  tags: [infrastructure, gitops, crossplane, cluster, iip]
  annotations:
    ipp.dhl.com/card-category: "IIP · GitOps"
    ipp.dhl.com/sort-order: "10"
    ipp.dhl.com/resource-type: "XIPPCluster"
spec:
  owner: platform-engineering
  type: infrastructure

  parameters:
    - title: Cluster Configuration
      required: [resourceName, targetProvider, environment, ownerTeam]
      properties:
        resourceName:
          title: Cluster Name
          type: string
          pattern: '^[a-z][a-z0-9-]{2,28}[a-z0-9]$'
          ui:autofocus: true
          ui:help: 'e.g. dev-cluster-01, ml-kind-test'
        targetProvider:
          title: Target Provider
          type: string
          enum: [kind, azure]
          enumNames: ["Local KIND (immediate)", "Azure AKS (requires Azure credentials)"]
          default: kind
        environment:
          title: Environment
          type: string
          enum: [dev, staging, prod]
          default: dev
        ownerTeam:
          title: Owner Team
          type: string
          default: platform-engineering
        businessUnit:
          title: Business Unit
          type: string
          default: bu-demo
        costCenter:
          title: Cost Center
          type: string
          default: demo-001
        nodeCount:
          title: Node Count
          type: integer
          default: 1
          minimum: 1
          maximum: 3
        kubernetesVersion:
          title: Kubernetes Version
          type: string
          enum: ["1.29", "1.30", "1.31"]
          default: "1.31"

  steps:
    - id: call-iip
      name: Submit Provisioning Request to IIP
      action: http:backstage:request
      input:
        method: POST
        path: /api/proxy/iip/api/provision
        headers:
          Content-Type: application/json
        body:
          resourceType: XIPPCluster
          targetProvider: ${{ parameters.targetProvider }}
          environment: ${{ parameters.environment }}
          requestedBy: ${{ user.entity.metadata.name }}
          businessUnit: ${{ parameters.businessUnit }}
          costCenter: ${{ parameters.costCenter }}
          entityRef: component:default/${{ parameters.resourceName }}
          params:
            resourceName: ${{ parameters.resourceName }}
            nodeCount: ${{ parameters.nodeCount }}
            kubernetesVersion: ${{ parameters.kubernetesVersion }}
            ownerTeam: ${{ parameters.ownerTeam }}

    - id: log-result
      name: Log Provisioning ID
      action: debug:log
      input:
        message: "Cluster provisioning started. ID: ${{ steps['call-iip'].output.body.provisioningId }} | Request: ${{ steps['call-iip'].output.body.requestId }}"

  output:
    links:
      - title: "View PR on GitHub"
        url: ${{ steps['call-iip'].output.body.prUrl }}
      - title: "Track in Catalog"
        url: /catalog/default/component/${{ parameters.resourceName }}
    text:
      - title: Provisioning ID
        content: "`${{ steps['call-iip'].output.body.provisioningId }}`"
      - title: Request ID
        content: "`${{ steps['call-iip'].output.body.requestId }}`"

