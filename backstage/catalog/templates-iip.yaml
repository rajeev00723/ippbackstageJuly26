# ── 2 of 6 — Virtual Machine ──────────────────────────────────────────────────
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: iip-provision-vm
  title: "[IIP] Provision Virtual Machine"
  description: >
    Provision a VM via IIP GitOps flow.
    Supports vSphere, Azure, and GCP targets.
    IIP writes a Crossplane XIPPVirtualMachine claim to Git.
  tags: [infrastructure, gitops, crossplane, vm, iip]
  annotations:
    ipp.dhl.com/card-category: "IIP · GitOps"
    ipp.dhl.com/sort-order: "11"
    ipp.dhl.com/resource-type: "XIPPVirtualMachine"
spec:
  owner: platform-engineering
  type: infrastructure

  parameters:
    - title: Virtual Machine Configuration
      required: [resourceName, targetProvider, environment, ownerTeam]
      properties:
        resourceName:
          title: VM Name
          type: string
          pattern: '^[a-z][a-z0-9-]{2,28}[a-z0-9]$'
          ui:autofocus: true
        targetProvider:
          title: Target Provider
          type: string
          enum: [vsphere, azure, gcp]
          enumNames: ["VMware vSphere", "Microsoft Azure", "Google Cloud"]
          default: azure
        environment:
          title: Environment
          type: string
          enum: [dev, staging, prod]
          default: dev
        ownerTeam:
          title: Owner Team
          type: string
          default: platform-engineering
        businessUnit:
          title: Business Unit
          type: string
          default: bu-demo
        costCenter:
          title: Cost Center
          type: string
          default: demo-001
        vmSize:
          title: VM Size
          type: string
          default: Standard_B2s
          ui:help: 'Azure: Standard_B2s | GCP: e2-medium | vSphere: small'
        osType:
          title: OS Type
          type: string
          enum: [linux, windows]
          default: linux

  steps:
    - id: call-iip
      name: Submit Provisioning Request to IIP
      action: http:backstage:request
      input:
        method: POST
        path: /api/proxy/iip/api/provision
        headers:
          Content-Type: application/json
        body:
          resourceType: XIPPVirtualMachine
          targetProvider: ${{ parameters.targetProvider }}
          environment: ${{ parameters.environment }}
          requestedBy: ${{ user.entity.metadata.name }}
          businessUnit: ${{ parameters.businessUnit }}
          costCenter: ${{ parameters.costCenter }}
          entityRef: component:default/${{ parameters.resourceName }}
          params:
            resourceName: ${{ parameters.resourceName }}
            vmSize: ${{ parameters.vmSize }}
            osType: ${{ parameters.osType }}
            ownerTeam: ${{ parameters.ownerTeam }}

    - id: log-result
      name: Log Provisioning ID
      action: debug:log
      input:
        message: "VM provisioning started. ID: ${{ steps['call-iip'].output.body.provisioningId }}"

  output:
    links:
      - title: "View PR on GitHub"
        url: ${{ steps['call-iip'].output.body.prUrl }}
    text:
      - title: Provisioning ID
        content: "`${{ steps['call-iip'].output.body.provisioningId }}`"

