# ── 6 of 6 — Splunk Forwarder ─────────────────────────────────────────────────
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: iip-provision-splunk-forwarder
  title: "[IIP] Provision Splunk Universal Forwarder"
  description: >
    Deploy a Splunk Universal Forwarder via IIP GitOps flow.
    IIP writes a Crossplane XIPPSplunkForwarder claim →
    Helm release (splunk-connect-for-kubernetes) on target cluster.
  tags: [infrastructure, gitops, crossplane, splunk, observability, iip]
  annotations:
    ipp.dhl.com/card-category: "IIP · GitOps"
    ipp.dhl.com/sort-order: "15"
    ipp.dhl.com/resource-type: "XIPPSplunkForwarder"
spec:
  owner: platform-engineering
  type: infrastructure

  parameters:
    - title: Splunk Forwarder Configuration
      required: [resourceName, targetProvider, environment, splunkHecUrl, ownerTeam]
      properties:
        resourceName:
          title: Forwarder Name
          type: string
          pattern: '^[a-z][a-z0-9-]{2,28}[a-z0-9]$'
          ui:autofocus: true
        targetProvider:
          title: Target Cluster
          type: string
          enum: [kind, azure, gcp]
          enumNames: ["Local KIND", "Azure AKS", "GCP GKE"]
          default: kind
        environment:
          title: Environment
          type: string
          enum: [dev, staging, prod]
          default: dev
        splunkHecUrl:
          title: Splunk HEC URL
          type: string
          default: "https://splunk.ipp.dhl.com:8088"
          ui:help: 'Splunk HTTP Event Collector endpoint'
        splunkIndex:
          title: Splunk Index
          type: string
          default: ipp-platform
        targetNamespace:
          title: Deploy Namespace
          type: string
          default: splunk-forwarder
        ownerTeam:
          title: Owner Team
          type: string
          default: platform-engineering
        businessUnit:
          title: Business Unit
          type: string
          default: bu-demo

  steps:
    - id: call-iip
      name: Submit Provisioning Request to IIP
      action: http:backstage:request
      input:
        method: POST
        path: /api/proxy/iip/api/provision
        headers:
          Content-Type: application/json
        body:
          resourceType: XIPPSplunkForwarder
          targetProvider: ${{ parameters.targetProvider }}
          environment: ${{ parameters.environment }}
          requestedBy: ${{ user.entity.metadata.name }}
          businessUnit: ${{ parameters.businessUnit }}
          entityRef: component:default/${{ parameters.resourceName }}
          params:
            resourceName: ${{ parameters.resourceName }}
            splunkHecUrl: ${{ parameters.splunkHecUrl }}
            splunkIndex: ${{ parameters.splunkIndex }}
            targetNamespace: ${{ parameters.targetNamespace }}
            ownerTeam: ${{ parameters.ownerTeam }}

    - id: log-result
      name: Log Provisioning ID
      action: debug:log
      input:
        message: "Splunk Forwarder provisioning started. ID: ${{ steps['call-iip'].output.body.provisioningId }}"

  output:
    links:
      - title: "View PR on GitHub"
        url: ${{ steps['call-iip'].output.body.prUrl }}
    text:
      - title: Provisioning ID
        content: "`${{ steps['call-iip'].output.body.provisioningId }}`"
