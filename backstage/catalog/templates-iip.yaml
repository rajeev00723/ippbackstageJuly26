# ── 4 of 6 — Database ─────────────────────────────────────────────────────────
apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: iip-provision-database
  title: "[IIP] Provision Managed Database"
  description: >
    Provision a managed database via IIP GitOps flow.
    Supports Azure Flexible Server (Postgres/MySQL) and GCP Cloud SQL.
  tags: [infrastructure, gitops, crossplane, database, iip]
  annotations:
    ipp.dhl.com/card-category: "IIP · GitOps"
    ipp.dhl.com/sort-order: "13"
    ipp.dhl.com/resource-type: "XIPPDatabase"
spec:
  owner: platform-engineering
  type: infrastructure

  parameters:
    - title: Database Configuration
      required: [resourceName, targetProvider, environment, ownerTeam]
      properties:
        resourceName:
          title: Database Instance Name
          type: string
          pattern: '^[a-z][a-z0-9-]{2,28}[a-z0-9]$'
          ui:autofocus: true
        targetProvider:
          title: Cloud Provider
          type: string
          enum: [azure, gcp]
          enumNames: ["Azure Flexible Server", "GCP Cloud SQL"]
          default: azure
        environment:
          title: Environment
          type: string
          enum: [dev, staging, prod]
          default: dev
        engine:
          title: Database Engine
          type: string
