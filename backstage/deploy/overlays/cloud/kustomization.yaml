apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/backstage
  - ../../base/aiops

patches:
  - target:
      kind: Ingress
      name: backstage
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: backstage.ipp.dhl.com
  - target:
      kind: Ingress
      name: aiops-engine
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: aiops.ipp.dhl.com
  - target:
      kind: Deployment
      name: backstage
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: aiops-engine
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2

images:
  - name: ipp-platform/backstage
    newTag: "1.0.0"
  - name: ipp-platform/aiops-engine
    newTag: "1.0.0"
